<?xml version="1.0" encoding="UTF-8"?>
<!--
  focusGaze monochrome / tray mark — circular seal on dark field
  Stitch tokens: #0B0F14, #2DD4BF, #F1F5F9
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="focusGaze mark">
  <rect width="1024" height="1024" fill="#0B0F14"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#2DD4BF" stroke-width="28"/>
  <!-- Simple eye glyph (reads at 16px) -->
  <path
    d="M280 512
       C380 360, 644 360, 744 512
       C644 664, 380 664, 280 512 Z"
    fill="none"
    stroke="#F1F5F9"
    stroke-width="36"
    stroke-linejoin="round"/>
  <circle cx="512" cy="512" r="72" fill="none" stroke="#F1F5F9" stroke-width="36"/>
  <circle cx="512" cy="512" r="40" fill="#0B0F14"/>
  <circle cx="512" cy="512" r="28" fill="#2DD4BF"/>
</svg>
