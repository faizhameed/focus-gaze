        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #243041;
            border-radius: 10px;
        }
    </style>

<body class="flex flex-col text-on-surface">
<!-- Header Section (TopAppBar Shared Component Mapping) -->
<header class="flex items-center justify-between px-md py-sm w-full bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm sticky top-0 z-50">
<div class="flex items-center gap-sm">
<div class="w-8 h-8 rounded-full bg-primary-container/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">visibility</span>
</div>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight">focusGaze</h1>
</div>
<div class="bg-tertiary-container/10 border border-tertiary/20 px-sm py-xs rounded-full">
<span class="text-tertiary font-label-sm text-label-sm uppercase tracking-widest flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-tertiary animate-pulse"></span>
                Bridge online
            </span>
</div>
</header>
<main class="flex-1 px-md py-md space-y-md overflow-y-auto">
<!-- Focus Mode Card -->
<section class="glass-card rounded-xl p-md flex items-center justify-between transition-all hover:border-primary/20">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Focus Mode</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Browser URL monitoring</p>
</div>
<button class="w-11 h-6 bg-primary-container rounded-full p-1 transition-colors relative flex items-center" id="focusToggle" onclick="this.classList.toggle('bg-primary-container'); this.querySelector('.thumb').classList.toggle('translate-x-5')">
<div class="thumb w-4 h-4 bg-white rounded-full shadow-md transition-transform transform translate-x-5"></div>
</button>
</section>
<!-- Camera Monitoring Card -->
<section class="glass-card rounded-xl p-md flex items-center justify-between transition-all hover:border-primary/20">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Camera Monitoring</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Phone detection (background)</p>
</div>
<button class="w-11 h-6 bg-outline-variant rounded-full p-1 transition-colors relative flex items-center" id="cameraToggle" onclick="this.classList.toggle('bg-primary-container'); this.querySelector('.thumb').classList.toggle('translate-x-5')">
<div class="thumb w-4 h-4 bg-white rounded-full shadow-md transition-transform transform"></div>
</button>
</section>
<!-- Bridge Settings Section -->
<div class="space-y-sm">
<h3 class="font-label-md text-label-md text-outline uppercase tracking-wider px-xs">Bridge Settings</h3>
<div class="glass-card rounded-xl p-md space-y-md">
<div class="flex items-center justify-between">
<span class="font-body-lg text-body-lg text-on-surface-variant">Port 18765</span>
<div class="flex items-center gap-xs">
<span class="font-label-sm text-label-sm text-tertiary">Enabled</span>
<button class="w-8 h-4.5 bg-tertiary-container rounded-full p-0.5 transition-colors relative flex items-center" onclick="this.classList.toggle('bg-tertiary-container'); this.querySelector('.thumb').classList.toggle('translate-x-3')">
<div class="thumb w-3.5 h-3.5 bg-white rounded-full shadow-sm transition-transform transform translate-x-3"></div>
</button>
</div>
</div>
<div class="relative group">
<input class="w-full bg-background/50 border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary/50 transition-colors cursor-default" readonly="" type="password" value="••••••••••••"/>
<span class="absolute right-3 top-1/2 -translate-y-1/2 font-label-sm text-label-sm text-outline group-hover:text-primary cursor-pointer transition-colors">Token</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-sm space-y-sm">
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-sm rounded-lg hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-primary/10">
                Save settings
            </button>
<button class="w-full flex items-center justify-center gap-sm border border-outline-variant text-on-surface-variant font-label-md text-label-md py-sm rounded-lg hover:bg-surface-variant/30 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-[16px]">download</span>
                Install to all Chrome profiles
            </button>
</div>
</main>
<!-- Footer (Shared Component Mapping) -->
<footer class="flex flex-col items-center gap-xs py-sm w-full bg-transparent mt-auto border-t border-outline-variant/10">
<p class="font-label-sm text-label-sm text-outline text-center px-md">
            Copy token from desktop app tray menu
        </p>
<div class="flex gap-md opacity-60">
<span class="font-label-sm text-label-sm text-outline">v1.0.4</span>
<span class="font-label-sm text-label-sm text-outline">•</span>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors" href="#">Documentation</a>
</div>
</footer>
