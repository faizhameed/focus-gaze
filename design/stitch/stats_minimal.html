<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>focusGaze — Stats (polished minimal)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0B0F14", surface: "#141A22", line: "#1E293B",
            teal: "#2DD4BF", mute: "#64748B", text: "#F1F5F9",
            bad: "#F87171", violet: "#A78BFA",
          },
          fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] },
        },
      },
    };
  </script>
</head>
<body class="bg-bg text-text min-h-screen flex font-sans antialiased">
  <!-- 168px rail -->
  <aside class="w-[168px] shrink-0 border-r border-line px-4 py-6 flex flex-col gap-1">
    <div class="text-teal text-[15px] font-extrabold tracking-wider mb-7 px-3">focusGaze</div>
    <a class="text-mute hover:text-text hover:bg-surface px-3.5 py-2.5 rounded-[10px] text-[13px] font-semibold" href="#">Home</a>
    <a class="text-mute hover:text-text hover:bg-surface px-3.5 py-2.5 rounded-[10px] text-[13px] font-semibold" href="#">Status</a>
    <a class="text-teal bg-surface px-3.5 py-2.5 rounded-[10px] text-[13px] font-semibold" href="#">Stats</a>
    <a class="text-mute hover:text-text hover:bg-surface px-3.5 py-2.5 rounded-[10px] text-[13px] font-semibold" href="#">Settings</a>
  </aside>

  <main class="flex-1 px-9 py-7 max-w-3xl space-y-5">
    <div class="flex items-center gap-4">
      <h1 class="text-[22px] font-bold tracking-tight mr-auto">Stats</h1>
      <div class="flex bg-surface border border-line rounded-xl p-1 gap-0.5">
        <button class="text-xs font-semibold text-mute px-3.5 py-2 rounded-lg">Today</button>
        <button class="text-xs font-semibold text-mute px-3.5 py-2 rounded-lg">Week</button>
        <button class="text-xs font-bold text-[#04352F] bg-teal px-3.5 py-2 rounded-lg">Session</button>
        <button class="text-xs font-semibold text-mute px-3.5 py-2 rounded-lg">Custom</button>
      </div>
    </div>

    <p class="text-mute text-[13px] font-medium -mt-1">Session · 1 session</p>

    <!-- Hero -->
    <section class="bg-surface border border-line rounded-2xl px-7 py-6 flex gap-12">
      <div>
        <div class="text-[40px] font-bold tracking-tight text-teal leading-none">87</div>
        <div class="text-[11px] font-semibold tracking-widest text-mute mt-2">SCORE</div>
      </div>
      <div>
        <div class="text-[40px] font-bold tracking-tight text-text leading-none">1h 24m</div>
        <div class="text-[11px] font-semibold tracking-widest text-mute mt-2">FOCUS TIME</div>
      </div>
    </section>

    <!-- Breakdown -->
    <section class="bg-surface border border-line rounded-2xl px-6 py-5 space-y-4">
      <div class="text-[11px] font-semibold tracking-widest text-mute">BREAKDOWN</div>
      <div class="flex items-center gap-3.5 text-[13px]">
        <span class="w-[72px] text-mute font-medium">On track</span>
        <div class="flex-1 h-2 bg-bg rounded-full overflow-hidden"><div class="h-full bg-teal rounded-full" style="width:62%"></div></div>
        <span class="w-[52px] text-right text-mute">48m</span>
      </div>
      <div class="flex items-center gap-3.5 text-[13px]">
        <span class="w-[72px] text-mute font-medium">Sites</span>
        <div class="flex-1 h-2 bg-bg rounded-full overflow-hidden"><div class="h-full bg-bad rounded-full" style="width:18%"></div></div>
        <span class="w-[52px] text-right text-mute">14m</span>
      </div>
      <div class="flex items-center gap-3.5 text-[13px]">
        <span class="w-[72px] text-mute font-medium">Phone</span>
        <div class="flex-1 h-2 bg-bg rounded-full overflow-hidden"><div class="h-full bg-violet rounded-full" style="width:10%"></div></div>
        <span class="w-[52px] text-right text-mute">8m</span>
      </div>
    </section>

    <!-- By day -->
    <section class="bg-surface border border-line rounded-2xl px-6 py-5">
      <div class="text-[11px] font-semibold tracking-widest text-mute mb-3">BY DAY</div>
      <div class="flex items-end gap-2.5 h-28">
        <div class="flex flex-col items-center gap-2 w-9"><div class="w-7 bg-teal rounded-md" style="height:70%"></div><span class="text-[11px] text-mute font-semibold tracking-wider">07-01</span></div>
        <div class="flex flex-col items-center gap-2 w-9"><div class="w-7 bg-teal rounded-md" style="height:55%"></div><span class="text-[11px] text-mute font-semibold tracking-wider">07-02</span></div>
        <div class="flex flex-col items-center gap-2 w-9"><div class="w-7 bg-teal rounded-md" style="height:88%"></div><span class="text-[11px] text-mute font-semibold tracking-wider">07-03</span></div>
        <div class="flex flex-col items-center gap-2 w-9"><div class="w-7 bg-teal rounded-md" style="height:40%"></div><span class="text-[11px] text-mute font-semibold tracking-wider">07-04</span></div>
        <div class="flex flex-col items-center gap-2 w-9"><div class="w-7 bg-teal rounded-md" style="height:75%"></div><span class="text-[11px] text-mute font-semibold tracking-wider">07-05</span></div>
      </div>
    </section>

    <section class="bg-surface border border-line rounded-2xl px-6 py-5">
      <div class="text-[11px] font-semibold tracking-widest text-mute mb-2">RECENT</div>
      <pre class="text-xs text-mute font-mono leading-relaxed">#12  1h 24m  87</pre>
    </section>
  </main>
</body>
</html>
